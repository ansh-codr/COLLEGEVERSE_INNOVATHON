name: CollegeVerse Deploy

on:
  push:
    branches: [main]

env:
  GCP_PROJECT_ID: collegeverse-99d69
  GCP_REGION: asia-south1
  CLOUD_RUN_SERVICE: collegeverse-api
  GAR_REPO: collegeverse

jobs:
  # ─── Backend → Cloud Run ──────────────────────────────────
  deploy-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Create Artifact Registry repo (if needed)
        run: |
          gcloud artifacts repositories describe ${{ env.GAR_REPO }} \
            --location=${{ env.GCP_REGION }} 2>/dev/null || \
          gcloud artifacts repositories create ${{ env.GAR_REPO }} \
            --repository-format=docker \
            --location=${{ env.GCP_REGION }} \
            --description="CollegeVerse Docker images"

      - name: Build & push Docker image
        run: |
          IMAGE=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }}
          docker build -t $IMAGE .
          docker push $IMAGE

      - name: Deploy to Cloud Run
        run: |
          IMAGE=${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPO }}/${{ env.CLOUD_RUN_SERVICE }}:${{ github.sha }}
          gcloud run deploy ${{ env.CLOUD_RUN_SERVICE }} \
            --image=$IMAGE \
            --region=${{ env.GCP_REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=512Mi \
            --min-instances=0 \
            --max-instances=3 \
            --set-env-vars="NODE_ENV=production" \
            --set-env-vars="FIREBASE_PROJECT_ID=${{ env.GCP_PROJECT_ID }}" \
            --set-env-vars="FIREBASE_STORAGE_BUCKET=${{ env.GCP_PROJECT_ID }}.firebasestorage.app" \
            --set-env-vars="CORS_ORIGIN=https://${{ env.GCP_PROJECT_ID }}.web.app" \
            --set-env-vars="AUTH_REQUIRE_EMAIL_VERIFIED=false" \
            --set-env-vars="LOG_LEVEL=info" \
            --set-env-vars="TRUST_PROXY=true" \
            --set-secrets="GEMINI_API_KEY=GEMINI_API_KEY:latest" \
            --service-account=${{ secrets.CLOUD_RUN_SA_EMAIL }}

  # ─── Frontend → Firebase Hosting ─────────────────────────
  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.GCP_SA_KEY }}
          channelId: live
          projectId: ${{ env.GCP_PROJECT_ID }}
